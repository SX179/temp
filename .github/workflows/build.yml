name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 自动生成gradle包装器，不用本地带gradlew
      - name: Generate gradle wrapper
        run: gradle wrapper

      - name: 赋予执行权限
        run: chmod +x gradlew

      - name: 打包Release
        run: ./gradlew assembleRelease

      - name: 导出APK
        uses: actions/upload-artifact@v4
        with:
          name: Tap_APK
          path: app/build/outputs/apk/release/app-release.apk
